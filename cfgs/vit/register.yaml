CORRUPTION:
  DATASET: imagenet
  SEVERITY:
  - 5
  TYPE:
    - gaussian_noise
    - shot_noise
    - impulse_noise
    - defocus_blur
    - glass_blur
    - motion_blur
    - zoom_blur
    - snow
    - frost
    - fog
    - brightness
    - contrast
    - elastic_transform
    - pixelate
    - jpeg_compression
MODEL:
  ADAPTATION: register
  # ARCH: Standard_VITB
  ARCH: VITB_augreg_in21k_ours
DPAL:
  NUM_PROMPT_TOKENS: 1
  PROMPT_DEEP: True
OPTIM:
  BETA: 0.9
  NORM_LR: 1e-2
  PROMPT_LR: 1e-2
  PREDICTOR_LR: 1e-2
  METHOD: SGD
  STEPS: 1
  WD: 0.0
  
  
TEST:
  BATCH_SIZE: 64
